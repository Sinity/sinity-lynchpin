rules:
  - id: lynchpin-secret-in-generated-output
    languages: [python]
    severity: ERROR
    message: >
      A literal containing what looks like a credential (api_key=, secret=,
      token=, bearer ...) is being written to a generated context pack or
      analysis artifact. Generated outputs are checked into .lynchpin/ and
      surfaced to LLMs; secrets must never reach this surface. Move the
      value through environment variables or a secret store and emit only
      a redacted placeholder.
    pattern-either:
      - patterns:
          - pattern-either:
              - pattern: $X.write_text("...")
              - pattern: save_json(..., "...")
              - pattern: json.dump("...", ...)
          - metavariable-regex:
              metavariable: $X
              regex: '.*(api[_-]?key|secret|token|bearer|password)\s*[:=]'
      - pattern-regex: '("|'')[Bb]earer\s+[A-Za-z0-9._\-]{20,}'
      - pattern-regex: '("|'')(api[_-]?key|secret|token)\s*[:=]\s*[A-Za-z0-9._\-]{20,}'
    paths:
      include:
        - "lynchpin/graph/**/*.py"
        - "lynchpin/analysis/**/*.py"
        - "lynchpin/cli/**/*.py"
